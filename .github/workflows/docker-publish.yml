name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - development
    tags:
      - '*.*.*'  # Matches tags like 1.2.3, 2.2.1, etc.

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch builds: main -> latest, development -> development
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=development,enable=${{ github.ref == 'refs/heads/development' }}
            # Version tags: 1.2.3 -> 1.2.3
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./modbus2mqtt.product.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release metadata
        if: github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/')
        id: release
        run: |
          set -euo pipefail

          prerelease=false
          case "${GITHUB_REF_NAME}" in
            development|*alpha*|*beta*|*gamma*) prerelease=true ;;
          esac

          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Write release asset metadata
        if: github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          {
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            echo "Release ref: ${{ github.ref_name }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo
            echo "Published tags:"
            printf '%s\n' '${{ steps.meta.outputs.tags }}' | sed 's/^/  /'
          } > DOCKER-IMAGE.txt

      - name: Create or update GitHub release
        if: github.ref == 'refs/heads/development' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          prerelease_flag=()

          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "${tag_name}" >/dev/null 2>&1; then
            gh release edit "${tag_name}" \
              --title "${tag_name}" \
              --notes-file DOCKER-IMAGE.txt \
              "${prerelease_flag[@]}"
            gh release upload "${tag_name}" DOCKER-IMAGE.txt --clobber
          elif [[ "${GITHUB_REF}" == refs/heads/development ]]; then
            gh release create "${tag_name}" DOCKER-IMAGE.txt \
              --target "${GITHUB_SHA}" \
              --title "${tag_name}" \
              --notes-file DOCKER-IMAGE.txt \
              "${prerelease_flag[@]}"
          else
            gh release create "${tag_name}" DOCKER-IMAGE.txt \
              --verify-tag \
              --title "${tag_name}" \
              --notes-file DOCKER-IMAGE.txt \
              "${prerelease_flag[@]}"
          fi
